    <style>
        /* --- BAZA --- */
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 15px; padding-bottom: 60px; }
        
        .neon-title { font-size: 28px; font-weight: 900; text-align: center; margin: 10px 0; color: #fff; text-shadow: 0 0 10px #3b82f6; }
        .top-signature { text-align: center; font-family: cursive; font-size: 12px; color: #fb923c; margin-bottom: 15px; }
        
        .section { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 15px; margin-bottom: 15px; position: relative; overflow: hidden; }
        .section-title { font-weight: 800; margin-bottom: 12px; font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
        .section-title::after { content:''; flex:1; height:1px; background: rgba(148, 163, 184, 0.2); }

        #searchInput { 
            width: 100%; 
            padding: 12px; 
            border-radius: 10px; 
            border: 2px solid #ef4444; 
            background: #1e293b; 
            color: white; 
            position: sticky; 
            top: 10px; 
            z-index: 100; 
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.8);
        }

        /* --- ZAKŁADKI --- */
        .tabs-container { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
        .tab { padding: 8px 12px; background: #334155; border-radius: 8px; cursor: pointer; font-size: 12px; border: 1px solid transparent; position: relative; overflow: hidden; }
        .tab.active { background: #1e3a8a; border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }

        .input-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; margin-left: 2px; display: block; }

        /* --- ANIMACJE --- */
        @keyframes text-pulse-yellow {
            0% { color: #ffff00; text-shadow: 0 0 2px rgba(255, 255, 0, 0.2); }
            50% { color: #facc15; text-shadow: 0 0 12px rgba(255, 255, 0, 0.8); }
            100% { color: #ffff00; text-shadow: 0 0 2px rgba(255, 255, 0, 0.2); }
        }

        @keyframes bounce-val { 0% { transform: scale(1); } 50% { transform: scale(1.3); color: #4ade80; } 100% { transform: scale(1); } }
        .bounce-anim { animation: bounce-val 0.2s ease-out; }

        .ripple { position: absolute; background: rgba(255, 255, 255, 0.4); border-radius: 50%; transform: scale(0); animation: ripple-anim 0.5s linear; pointer-events: none; }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

        /* --- ELEMENTY LISTY --- */
        .material-card { margin-top: 15px; }
        .material-name { font-weight: 800; font-size: 18px; color: #93c5fd; border-bottom: 2px solid #3b82f6; margin-bottom: 8px; padding: 8px 5px; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; }
        .group-active .material-name > span:first-child { animation: text-pulse-yellow 1.5s infinite; }
        .group-active .material-name { border-bottom-color: #ffff00; }
        
        .img-preview-btn { font-size: 18px; cursor: pointer; padding: 2px 6px; border-radius: 6px; transition: transform 0.1s, background-color 0.2s; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); display: inline-flex; align-items: center; justify-content: center; }
        .img-preview-btn:active { transform: scale(0.85); background: #3b82f6; }

        .dimension-row { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-radius: 8px; margin-bottom: 4px; background: rgba(0,0,0,0.2); position: relative; overflow: hidden; transition: 0.3s; }
        .active-dimension { border: 1px solid rgba(255, 255, 0, 0.3); background: rgba(255, 255, 0, 0.04) !important; }
        .active-dimension div:first-child { color: #ffff00; font-weight: bold; }
        
        .qty-box { display: flex; align-items: center; gap: 4px; position: relative; z-index: 2; }
        .qty { width: 45px; height: 36px; text-align: center; background: #0f172a; color: white; border: 1px solid #475569; border-radius: 6px; font-weight: bold; transition: 0.2s; pointer-events: none; }
        .qty.selected { background: #ffff00 !important; color: #000 !important; border-color: #ffff00; }
        
        .qty-btn { 
            width: 36px; height: 36px; background: #334155; border: 1px solid #475569; 
            color: white; border-radius: 8px; font-weight: bold; cursor: pointer; 
            position: relative; overflow: hidden; transition: transform 0.1s;
        }
        .qty-btn:active { transform: scale(0.8); background: #3b82f6; }
        .qty-btn.fast { width: 32px; height: 32px; font-size: 10px; background: #1e293b; color: #94a3b8; }
        .qty-btn.fast:active { background: #ef4444; }

        /* --- INPUTY I PRZYCISKI --- */
        input, select, textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; margin-bottom: 8px; }
        .btn { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; background: #475569; width: 100%; text-transform: uppercase; position: relative; overflow: hidden; }
        .btn-blue { background: #1e40af; }
        .btn-red { background: #7f1d1d; }

        .summary-box { white-space: pre-wrap; font-size: 13px; padding: 15px; background: #000; color: #cbd5e1; border-radius: 8px; border: 1px solid #334155; line-height: 1.5; border-left: 4px solid #3b82f6; }
        
        .db-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #334155; font-size: 13px; }
        .db-actions { display: flex; gap: 10px; font-weight: bold; }
        .act-edit { color: #3b82f6; cursor: pointer; }
        .act-del { color: #ef4444; cursor: pointer; }

        .order-preview { background: rgba(15, 23, 42, 0.5); border-radius: 8px; padding: 10px; margin-bottom: 10px; font-size: 11px; border: 1px dashed #475569; line-height: 1.6; }
        .order-preview-item { display: inline-block; background: #334155; padding: 2px 8px; border-radius: 4px; margin: 2px; color: #94a3b8; }
        .order-preview-item.current-active { background: #1e40af; color: #fff; border: 1px solid #3b82f6; }
        
        .weight-badge { font-size: 9px; color: #4ade80; background: rgba(74, 222, 128, 0.1); padding: 2px 4px; border-radius: 4px; margin-top: 2px; display: block; }

        /* --- OKNA MODALNE (NOWY DESIGN DIALOGÓW) --- */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(15, 23, 42, 0.85); align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s ease-in-out; padding: 20px; backdrop-filter: blur(4px); }
        .modal.show { display: flex; opacity: 1; }
        .modal-content { max-width: 100%; max-height: 80vh; border-radius: 12px; border: 2px solid #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); object-fit: contain; }

        .custom-dialog { background: #1e293b; border: 2px solid #3b82f6; border-radius: 16px; padding: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); transform: scale(0.9); transition: transform 0.2s ease; }
        .modal.show .custom-dialog { transform: scale(1); }
        .dialog-title { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 12px; text-shadow: 0 0 5px rgba(59, 130, 246, 0.3); }
        .dialog-msg { font-size: 14px; color: #cbd5e1; margin-bottom: 20px; line-height: 1.4; }
        .dialog-buttons { display: flex; gap: 10px; justify-content: flex-end; }
        .dialog-btn { padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; font-size: 13px; text-transform: uppercase; }

        .dialog-btn-cancel { background: #475569; color: #cbd5e1; }
        .dialog-btn-danger { background: #ef4444; color: white; }

/* --- POPRAWNA REJESTRACJA REALNEGO SERVICE WORKERA --- */
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('Service Worker zarejestrowany!'))
            .catch(err => console.log('Błąd rejestracji SW:', err));
    });
}

/* --- AUDIO --- */
let audioCtx = null;
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playClick(f = 800) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(f, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
    g.gain.setValueAtTime(0.04, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

/* --- RIPPLE --- */
function createRipple(e) {
    const el = e.currentTarget;
    const ripple = document.createElement("span");
    const rect = el.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    const x = (e.clientX || e.touches?.[0].clientX) - rect.left - size/2;
    const y = (e.clientY || e.touches?.[0].clientY) - rect.top - size/2;
    ripple.style.width = ripple.style.height = `${size}px`;
    ripple.style.left = `${x}px`;
    ripple.style.top = `${y}px`;
    ripple.classList.add("ripple");
    el.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
}

/* --- FUNKCJE NOWEGO MODALA OKIENKA SYSTEMOWEGO --- */
function showCustomDialog({ title, msg, type = 'alert', placeholder = '', defaultValue = '', isDanger = false }) {
    return new Promise((resolve) => {
        const modal = document.getElementById("customDialogModal");
        const tEl = document.getElementById("dialogTitle");
        const mEl = document.getElementById("dialogMsg");
        const iEl = document.getElementById("dialogInput");
        const btnCancel = document.getElementById("dialogBtnCancel");
        const btnConfirm = document.getElementById("dialogBtnConfirm");

        tEl.innerText = title;
        mEl.innerText = msg;
        
        if (type === 'prompt') {
            iEl.style.display = 'block';
            iEl.value = defaultValue;
            iEl.placeholder = placeholder;
        } else {
            iEl.style.display = 'none';
        }

        if (type === 'alert') {
            btnCancel.style.display = 'none';
        } else {
            btnCancel.style.display = 'block';
        }

        if (isDanger) {
            btnConfirm.className = "dialog-btn dialog-btn-danger";
        } else {
            btnConfirm.className = "dialog-btn dialog-btn-confirm";
        }

        modal.classList.add("show");

        function close(result) {
            modal.classList.remove("show");
            btnConfirm.onclick = null;
            btnCancel.onclick = null;
            resolve(result);
        }

        btnConfirm.onclick = () => {
            if (type === 'prompt') close(iEl.value);
            else close(true);
        };
        
        btnCancel.onclick = () => {
            close(null);
        };
    });
}

function openImageModal(e, groupName) {
    e.stopPropagation(); 
    playClick(1100);
    const modal = document.getElementById("imageModal");
    const modalImg = document.getElementById("modalImg");
    const imgSrc = materialImages[groupName];
    
    if(imgSrc) {
        modalImg.src = imgSrc;
        modal.classList.add("show");
    }
}

function closeImageModal() {
    const modal = document.getElementById("imageModal");
    modal.classList.remove("show");
}

const dbName = "MaterialowkaDB";
const storeName = "AppStorage";

function getDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(dbName, 1);
        request.onupgradeneeded = e => e.target.result.createObjectStore(storeName);
        request.onsuccess = e => resolve(e.target.result);
        request.onerror = e => reject(e.target.error);
    });
}

function dbGet(key) {
    return getDB().then(db => new Promise((resolve) => {
        const transaction = db.transaction(storeName, "readonly");
        const request = transaction.objectStore(storeName).get(key);
        request.onsuccess = () => resolve(request.result);
    }));
}

function dbSet(key, val) {
    return getDB().then(db => new Promise((resolve) => {
        const transaction = db.transaction(storeName, "readwrite");
        transaction.objectStore(storeName).put(val, key);
        transaction.oncomplete = () => resolve();
    }));
}

function dbDel(key) {
    return getDB().then(db => new Promise((resolve) => {
        const transaction = db.transaction(storeName, "readwrite");
        transaction.objectStore(storeName).delete(key);
        transaction.oncomplete = () => resolve();
    }));
}

let materialData = {};
let groupOrder = [];
let tabs = [];
let currentTab = "";

window.onload = async () => {
    materialData = await dbGet("materialData") || defaultMaterialData;
    groupOrder = await dbGet("groupOrder") || Object.keys(materialData);
    tabs = await dbGet("tabs") || ["Budowa 1"];
    currentTab = await dbGet("currentTab") || "Budowa 1";

    ["scaffoldNumber", "notesArea", "calcLength", "calcHeight", "calcWidth"].forEach(id => {
        const el = document.getElementById(id);
        if(el) el.addEventListener('input', () => { updateSummary(); saveTabData(); });
    });
    
    const searchInp = document.getElementById("searchInput");
    if(searchInp) searchInp.addEventListener('input', filterMaterials);
    
    refreshUI();
};

function refreshUI() {
    renderTabs();
    generateMainList();
    refreshSettingsUI();
    updateSummary();
}

function generateMainList() {
    const container = document.getElementById("mainContainer");
    container.innerHTML = "";
    groupOrder.forEach(g => {
        const card = document.createElement("div");
        card.className = "section material-card";
        card.dataset.group = g;
        
        const hasImg = materialImages[g] ? `<span class="img-preview-btn" onclick="openImageModal(event, '${g}')">📷</span>` : '';
        card.innerHTML = `<div class="material-name"><span>${g}</span> ${hasImg}</div>`;
        
        let dims = materialData[g] || [];
        dims.forEach(d => {
            const parts = d.split("|");
            const dimName = parts[0].trim();
            const dimWeight = parts[1] ? parts[1].trim() : "0";
            
            const key = `${g}_${dimName}`;
            const row = document.createElement("div");
            row.className = "dimension-row";
            row.innerHTML = `
                <div>
                    <div style="font-size:13px">${dimName}</div>
                    ${dimWeight > 0 ? `<span class="weight-badge">${dimWeight} kg/szt.</span>` : ''}
                </div>
                <div class="qty-box">
                    <button class="qty-btn fast" onclick="changeQty(event, '${key}', -5)">-5</button>
                    <button class="qty-btn" onclick="changeQty(event, '${key}', -1)">-</button>
                    <input class="qty" data-key="${key}" data-weight="${dimWeight}" type="number" value="0" readonly>
                    <button class="qty-btn" onclick="changeQty(event, '${key}', 1)">+</button>
                    <button class="qty-btn fast" onclick="changeQty(event, '${key}', 5)">+5</button>
                </div>`;
            card.appendChild(row);
        });
        container.appendChild(card);
    });
    document.querySelectorAll('.qty-btn, .btn, .tab').forEach(b => b.addEventListener('mousedown', createRipple));
    loadTabData();
}

function changeQty(e, key, delta) {
    const input = document.querySelector(`input[data-key="${key}"]`);
    if(input) {
        const newVal = (parseInt(input.value) || 0) + delta;
        input.value = newVal;
        
        input.classList.remove('bounce-anim');
        void input.offsetWidth;
        input.classList.add('bounce-anim');
        
        if (newVal < 0) {
            input.style.setProperty('background', '#3b82f6', 'important');
            input.style.setProperty('color', '#fff', 'important');
            input.style.borderColor = '#3b82f6';
        } else if (newVal > 0) {
            input.style.setProperty('background', '#ffff00', 'important');
            input.style.setProperty('color', '#000', 'important');
            input.style.borderColor = '#ffff00';
        } else {
            input.style.background = '';
            input.style.color = '';
            input.style.borderColor = '';
        }
        
        playClick(delta > 0 ? 1000 : 600);
        updateSummary();
        saveTabData();
    }
}

function updateSummary() {
    let text = `Data: ${new Date().toLocaleDateString('pl-PL')}\n`;
    const nr = document.getElementById("scaffoldNumber").value;
    if(nr) text += `Nr: ${nr}\n`;

    const lRaw = document.getElementById("calcLength").value.replace(",", ".");
    const hRaw = document.getElementById("calcHeight").value.replace(",", ".");
    const wRaw = document.getElementById("calcWidth").value.replace(",", ".");

    let lSum = 0;
    lRaw.split("+").forEach(part => { lSum += parseFloat(part) || 0; });

    let hSum = 0;
    hRaw.split("+").forEach(part => { hSum += parseFloat(part) || 0; });

    let wSum = 0;
    wRaw.split("+").forEach(part => { wSum += parseFloat(part) || 0; });

    if(lSum > 0 || hSum > 0) {
        const m2 = lSum * hSum;
        const m3 = m2 * wSum;
        text += `\nKalkulator:\nSuma długości: ${lSum.toFixed(2)}m\n`;
        if(hSum > 0) text += `Wysokość: ${hSum.toFixed(2)}m\n`;
        if(wSum > 0) text += `Szerokość: ${wSum.toFixed(2)}m\n`;
        text += `m²: ${m2.toFixed(2)}\n`;
        if(wSum > 0) text += `m³: ${m3.toFixed(2)}\n`;
        document.getElementById("calcResult").innerText = `${m2.toFixed(2)} m² ${m3 > 0 ? '| ' + m3.toFixed(2) + ' m³' : ''}`;
    } else { document.getElementById("calcResult").innerText = ""; }

    let materialsText = "";
    let totalWeight = 0;
    
    groupOrder.forEach(g => {
        let groupHasItems = false;
        const card = document.querySelector(`.material-card[data-group="${g}"]`);
        document.querySelectorAll(`input[data-key^="${g}_"]`).forEach(input => {
            const val = parseInt(input.value) || 0;
            const weight = parseFloat(input.dataset.weight) || 0;
            const row = input.closest(".dimension-row");
            
            if(val !== 0) {
                groupHasItems = true;
                const dimName = input.dataset.key.replace(g + "_", "");
                materialsText += `${g} ${dimName} — ${val} szt.\n`;
                totalWeight += (val * weight);
                row.classList.add("active-dimension");
                input.classList.add("selected");
            } else {
                row.classList.remove("active-dimension");
                input.classList.remove("selected");
            }
        });
        
        if(card) {
            if(groupHasItems) card.classList.add("group-active");
            else card.classList.remove("group-active");
        }
    });

    if(materialsText) text += `\nLista materiału:\n${materialsText}`;
    if(totalWeight !== 0) text += `\nWaga całkowita: ${totalWeight.toFixed(2)} kg\n`;
    
    const notes = document.getElementById("notesArea").value;
    if(notes) text += `\nUwagi:\n${notes}`;
    document.getElementById("summaryContent").textContent = text;
}

async function saveTabData() {
    const data = {
        nr: document.getElementById("scaffoldNumber").value,
        notes: document.getElementById("notesArea").value,
        l: document.getElementById("calcLength").value,
        h: document.getElementById("calcHeight").value,
        w: document.getElementById("calcWidth").value,
        qtys: {}
    };
    document.querySelectorAll(".qty").forEach(i => data.qtys[i.dataset.key] = i.value);
    await dbSet("tabData_" + currentTab, data);
}

async function loadTabData() {
    const saved = await dbGet("tabData_" + currentTab) || {};
    document.getElementById("scaffoldNumber").value = saved.nr || "";
    document.getElementById("notesArea").value = saved.notes || "";
    document.getElementById("calcLength").value = saved.l || "";
    document.getElementById("calcHeight").value = saved.h || "";
    document.getElementById("calcWidth").value = saved.w || "";
    
    document.querySelectorAll(".qty").forEach(i => {
        const val = saved.qtys?.[i.dataset.key] || 0;
        i.value = val;
        
        if (parseInt(val) < 0) {
            i.style.setProperty('background', '#3b82f6', 'important');
            i.style.setProperty('color', '#fff', 'important');
            i.style.borderColor = '#3b82f6';
        } else if (parseInt(val) > 0) {
            i.style.setProperty('background', '#ffff00', 'important');
            i.style.setProperty('color', '#000', 'important');
            i.style.borderColor = '#ffff00';
        } else {
            i.style.background = '';
            i.style.color = '';
            i.style.borderColor = '';
        }
    });
    updateSummary();
}

function renderTabs() {
    const container = document.getElementById("tabsContainer");
    container.innerHTML = "";
    tabs.forEach(t => {
        const div = document.createElement("div");
        div.className = `tab ${t === currentTab ? 'active' : ''}`;
        div.innerHTML = `${t} <span onclick="deleteTab(event, '${t}')" style="margin-left:5px">×</span>`;
        div.onclick = async (e) => { 
            createRipple(e); 
            currentTab = t; 
            await dbSet("currentTab", t); 
            refreshUI(); 
        };
        container.appendChild(div);
    });
}

async function addTab(e) {
    createRipple(e);
    const name = await showCustomDialog({
        title: 'Nowa budowa',
        msg: 'Podaj nazwę dla nowej budowy:',
        type: 'prompt',
        placeholder: 'np. Budowa Gdańsk'
    });
    
    if(name && !tabs.includes(name)) {
        tabs.push(name); currentTab = name;
        await dbSet("tabs", tabs); 
        await dbSet("currentTab", currentTab);
        refreshUI();
    }
}

async function deleteTab(e, name) {
    e.stopPropagation();
    if(tabs.length > 1) {
        const confirmDel = await showCustomDialog({
            title: 'Usuwanie budowy',
            msg: `Czy na pewno chcesz bezpowrotnie usunąć budowę: "${name}"?`,
            type: 'confirm',
            isDanger: true
        });
        
        if (confirmDel) {
            tabs = tabs.filter(t => t !== name);
            await dbDel("tabData_" + name);
            if(currentTab === name) currentTab = tabs[0];
            await dbSet("tabs", tabs); 
            await dbSet("currentTab", currentTab);
            refreshUI();
        }
    }
}

async function addGroup(e) {
    createRipple(e);
    const n = document.getElementById("newGroupName").value.trim();
    if(n && !materialData[n]) {
        materialData[n] = []; groupOrder.push(n);
        document.getElementById("newGroupName").value = "";
        await saveBase(); refreshUI();
    }
}

async function moveGroup(dir, e) {
    createRipple(e);
    const sel = document.getElementById("groupSelect");
    const g = sel.value;
    const i = groupOrder.indexOf(g);
    const ni = i + dir;
    if(ni >= 0 && ni < groupOrder.length) {
        [groupOrder[i], groupOrder[ni]] = [groupOrder[ni], groupOrder[i]];
        await saveBase();
        generateMainList();
        refreshSettingsUI();
        document.getElementById("groupSelect").value = g;
        refreshSettingsUI(); 
    }
}

async function addDim(e) {
    createRipple(e);
    const g = document.getElementById("groupSelect").value;
    const v = document.getElementById("newDimValue").value.trim();
    if(g && v) { materialData[g].push(v); document.getElementById("newDimValue").value = ""; await saveBase(); refreshUI(); }
}

async function editDim(g, i) {
    const oldVal = materialData[g][i];
    const newVal = await showCustomDialog({
        title: 'Edycja wymiaru',
        msg: 'Zmień format (Wymiar | waga):',
        type: 'prompt',
        defaultValue: oldVal
    });
    
    if (newVal !== null && newVal.trim() !== "") {
        materialData[g][i] = newVal.trim();
        await saveBase();
        refreshUI();
    }
}

async function removeDim(g, i) { 
    const confirmDel = await showCustomDialog({
        title: 'Usuwanie wymiaru',
        msg: 'Czy na pewno chcesz usunąć ten wymiar z bazy danych?',
        type: 'confirm',
        isDanger: true
    });
    
    if(confirmDel) {
        materialData[g].splice(i, 1); 
        await saveBase(); 
        refreshUI(); 
    }
}

function refreshSettingsUI() {
    const sel = document.getElementById("groupSelect");
    const curr = sel.value; 
    sel.innerHTML = "";
    groupOrder.forEach(g => { 
        const opt = document.createElement("option"); 
        opt.value = opt.text = g; 
        sel.appendChild(opt); 
    });
    
    if(curr && materialData[curr]) sel.value = curr;
    
    const preview = document.getElementById("groupOrderPreview");
    preview.innerHTML = "";
    groupOrder.forEach(g => {
        const span = document.createElement("span");
        span.className = `order-preview-item ${g === sel.value ? 'current-active' : ''}`;
        span.innerText = g;
        preview.appendChild(span);
    });

    const list = document.getElementById("dimsSettingsList");
    list.innerHTML = "";
    const g = sel.value;
    if(g && materialData[g]) {
        materialData[g].forEach((d, i) => {
            list.innerHTML += `<div class="db-item">
                <span>${d}</span>
                <div class="db-actions">
                    <span class="act-edit" onclick="editDim('${g}', ${i})">Edytuj</span>
                    <span class="act-del" onclick="removeDim('${g}', ${i})">Usuń</span>
                </div>
            </div>`;
        });
    }
}

async function saveBase() { 
    await dbSet("materialData", materialData); 
    await dbSet("groupOrder", groupOrder); 
}

async function clearCurrentTab(e) { 
    createRipple(e); 
    const confirmClear = await showCustomDialog({
        title: 'Czyszczenie formularza',
        msg: 'Czy na pewno chcesz wyczyścić wszystkie wprowadzone ilości oraz kalkulator dla tej budowy?',
        type: 'confirm',
        isDanger: true
    });
    
    if(confirmClear) { 
        document.getElementById("scaffoldNumber").value = ""; 
        document.getElementById("calcLength").value = ""; 
        document.getElementById("calcHeight").value = ""; 
        document.getElementById("calcWidth").value = ""; 
        document.getElementById("notesArea").value = ""; 
        
        document.querySelectorAll(".qty").forEach(i => {
            i.value = 0;
            i.style.background = '';
            i.style.color = '';
            i.style.borderColor = '';
        }); 
        
        await saveTabData(); 
        updateSummary(); 
    } 
}

async function copySummary(e) { 
    createRipple(e); 
    playClick(1200); 
    navigator.clipboard.writeText(document.getElementById("summaryContent").textContent); 
    
    await showCustomDialog({
        title: 'Gotowe!',
        msg: 'Podsumowanie materiałowe zostało skopiowane do Twojego schowka.',
        type: 'alert'
    });
}

function filterMaterials() { const term = this.value.toLowerCase(); document.querySelectorAll(".material-card").forEach(card => { card.style.display = card.innerText.toLowerCase().includes(term) ? "block" : "none"; }); }
</script>
